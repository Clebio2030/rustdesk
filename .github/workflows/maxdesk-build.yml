name: Build MaxDesk Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/versão do release (ex: v1.4.9)"
        required: false
        default: "nightly"

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.9"
  TAG_NAME: ${{ github.event.inputs.tag || 'nightly' }}
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # Gera os arquivos de bridge Flutter/Rust
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  # Compila o helper de janela topmost (dependência do build Windows)
  build-topmostwindow:
    uses: ./.github/workflows/third-party-RustDeskTempTopMostWindow.yml
    with:
      upload-artifact: true
      target: windows-2022
      configuration: Release
      platform: x64
      target_version: Windows10

  # Build principal: MaxDesk Windows x64
  build-maxdesk-windows:
    name: MaxDesk Windows x64
    needs: [build-topmostwindow, generate-bridge]
    runs-on: windows-2022

    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-artifact
          path: ./

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@ebc0426251bc40c7cd31162802432c68818ab8f0
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: Install Flutter
        uses: subosito/flutter-action@2783a3f08e1baf891508463f8c6653c258246225
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          architecture: x64

      - name: Replace engine with rustdesk custom flutter engine
        run: |
          flutter doctor -v
          flutter precache --windows
          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
          mv -Force windows-x64-release/* C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/

      - name: Patch flutter
        shell: bash
        run: |
          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
          cd $(dirname $(dirname $(which flutter)))
          [[ "3.24.5" == ${{ env.FLUTTER_VERSION }} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          prefix-key: windows-2022

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        env:
          VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
        run: |
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-windows-static \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"; cat "$_1"
            done
            exit 1
          fi
        shell: bash

      - name: Build MaxDesk
        run: |
          python3 .\build.py --portable --flutter --skip-portable-pack --hwcodec --vram
          mv ./flutter/build/windows/x64/runner/Release ./maxdesk

          # usbmmidd driver
          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
          Expand-Archive usbmmidd_v2.zip -DestinationPath .
          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe","usbmmidd_v2\deviceinstaller.exe","usbmmidd_v2\usbmmidd.bat"
          mv -Force .\usbmmidd_v2 ./maxdesk

      - name: Copy Runner.res for portable packer
        continue-on-error: true
        shell: bash
        run: |
          runner_res=$(find . -name "Runner.res")
          if [ -n "$runner_res" ]; then
            cp "$runner_res" ./libs/portable/Runner.res
          fi

      - name: Download RustDeskTempTopMostWindow
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: topmostwindow-artifacts-x64
          path: "./maxdesk"

      - name: Build self-extracted installer (.exe)
        shell: bash
        run: |
          sed -i '/dpiAware/d' res/manifest.xml
          pushd ./libs/portable
          pip3 install -r requirements.txt
          python3 ./generate.py -f ../../maxdesk/ -o . -e ../../maxdesk/rustdesk.exe
          popd
          mkdir -p ./Output
          mv ./target/release/rustdesk-portable-packer.exe ./Output/maxdesk-${{ env.VERSION }}-x86_64.exe

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Build MSI installer
        run: |
          pushd ./res/msi
          python preprocess.py --arp -d ../../maxdesk
          nuget restore msi.sln
          msbuild msi.sln -p:Configuration=Release -p:Platform=x64 /p:TargetVersion=Windows10
          $msi = Get-ChildItem ./Package/bin/*/Release/en-us/Package.msi | Select-Object -First 1
          mv $msi.FullName ../../Output/maxdesk-${{ env.VERSION }}-x86_64.msi

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: maxdesk-windows-x64-${{ env.VERSION }}
          path: |
            ./Output/maxdesk-*.exe
            ./Output/maxdesk-*.msi

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          prerelease: false
          tag_name: ${{ github.ref_name }}
          name: "MaxDesk ${{ github.ref_name }}"
          body: |
            ## MaxDesk ${{ github.ref_name }}
            
            Instalador para Windows x64.
            
            - `maxdesk-${{ env.VERSION }}-x86_64.exe` — instalador portátil (recomendado)
            - `maxdesk-${{ env.VERSION }}-x86_64.msi` — instalador MSI (para GPO/SCCM)
            
            Servidor: maxdesk.csdigitalz.com.br
          files: |
            ./Output/maxdesk-*.exe
            ./Output/maxdesk-*.msi
