name: Build MaxDesk Android (APK universal)

on:
  workflow_dispatch:

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  NDK_VERSION: "r27c"
  CARGO_NDK_VERSION: "3.5.4"
  VERSION: "1.4.9"
  # cache binario do vcpkg DESLIGADO de proposito: ao restaurar do cache x-gha, os
  # headers (vpx/vp8.h, opus/opus_multistream.h) nao ficam materializados no install
  # tree /opt/vcpkg/installed/<triplet>/include e scrap/magnum-opus falham. Build fresca
  # (~15min de deps) instala tudo corretamente, como no run #1.
  VCPKG_BINARY_SOURCES: "clear"

jobs:
  # Gera os arquivos de bridge Flutter/Rust (mesma fonte do build Windows)
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-android:
    name: MaxDesk Android universal
    needs: generate-bridge
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: bridge-artifact
          path: .

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc g++ git libclang-dev llvm-dev \
            nasm ninja-build pkg-config wget yasm unzip

      - name: Install Rust toolchain (android targets)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi
          components: "rustfmt"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          prefix-key: android-universal

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version ${{ env.CARGO_NDK_VERSION }} --locked

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2
        with:
          vcpkgDirectory: /opt/vcpkg
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Build Android vcpkg dependencies (arm64-v8a + armeabi-v7a)
        shell: bash
        env:
          VCPKG_ROOT: /opt/vcpkg
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          bash flutter/build_android_deps.sh arm64-v8a
          bash flutter/build_android_deps.sh armeabi-v7a
          echo "===== DIAG: onde estao os headers android ====="
          ls -la /opt/vcpkg/installed/ 2>&1 || true
          for t in arm64-android arm-android arm-neon-android; do
            echo "--- $t include/vpx include/opus ---"
            ls /opt/vcpkg/installed/$t/include/vpx/vp8.h /opt/vcpkg/installed/$t/include/opus/opus_multistream.h 2>&1 || true
          done
          echo "--- find vp8.h em todo o vcpkg ---"
          find /opt/vcpkg -name vp8.h 2>/dev/null | head

      - name: Build MaxDesk Rust lib (arm64 + arm) into jniLibs
        shell: bash
        env:
          VCPKG_ROOT: /opt/vcpkg
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          # varias crates -sys (magnum-opus, kcp-sys, ...) rodam bindgen e por padrao o
          # libclang usa os headers do host (/usr/include) -> 'bits/libc-header-start.h
          # not found' e nao acha os headers do vcpkg (opus/opus_multistream.h). Apontamos
          # bindgen pro sysroot do NDK + include do vcpkg por-target.
          NDK_SYSROOT: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          BINDGEN_EXTRA_CLANG_ARGS_aarch64-linux-android: "--sysroot=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot -I/opt/vcpkg/installed/arm64-android/include"
          BINDGEN_EXTRA_CLANG_ARGS_armv7-linux-androideabi: "--sysroot=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/sysroot -I/opt/vcpkg/installed/arm-android/include"
        run: |
          # sem hwcodec: o build.rs da crate hwcodec tambem roda bindgen; fica pra depois.
          cargo ndk --platform 21 --target aarch64-linux-android -o ./flutter/android/app/src/main/jniLibs \
            build --locked --release --features flutter
          cargo ndk --platform 21 --target armv7-linux-androideabi -o ./flutter/android/app/src/main/jniLibs \
            build --locked --release --features flutter
          # strip via llvm-strip do NDK (reduz o tamanho da .so)
          TC="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          "$TC/llvm-strip" ./flutter/android/app/src/main/jniLibs/arm64-v8a/*.so || true
          "$TC/llvm-strip" ./flutter/android/app/src/main/jniLibs/armeabi-v7a/*.so || true
          ls -la ./flutter/android/app/src/main/jniLibs/*/

      - name: Install Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Generate ephemeral signing keystore
        shell: bash
        run: |
          cd flutter/android
          keytool -genkey -v -keystore maxdesk.jks -keyalg RSA -keysize 2048 -validity 10000 \
            -alias maxdesk -storepass maxdesk123 -keypass maxdesk123 \
            -dname "CN=MaxDesk, OU=CSDigitalz, O=CSDigitalz, L=BR, S=BR, C=BR"
          cat > key.properties <<EOF
          storePassword=maxdesk123
          keyPassword=maxdesk123
          keyAlias=maxdesk
          storeFile=maxdesk.jks
          EOF

      - name: Build universal APK
        shell: bash
        run: |
          pushd flutter
          # versionName/versionCode para o app
          {
            echo "flutter.versionName=${{ env.VERSION }}"
            echo "flutter.versionCode=$(date +%s)"
          } >> android/local.properties
          flutter pub get
          flutter build apk --release --target-platform android-arm64,android-arm
          popd
          mkdir -p Output
          cp flutter/build/app/outputs/flutter-apk/app-release.apk Output/maxdesk.apk
          ls -la Output/

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: maxdesk-android-universal-${{ env.VERSION }}
          path: ./Output/maxdesk.apk

      - name: Publish to Release (android-latest)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: MaxDesk Android (universal)
          files: ./Output/maxdesk.apk
